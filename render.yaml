services:
  - type: web
    name: saint-tutos
    env: php
    plan: free
    buildCommand: composer install --no-dev && php artisan optimize
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: NODE_VERSION
        value: 20